version: 3
contact_email: joe.sawicki.jr@gmail.com

state:
  max_seen_items: 5000

email:
  min_score: 7

keywords:
  high_priority:
    - nitazene
    - isotonitazene
    - metonitazene
    - protonitazene
    - etonitazepyne
    - medetomidine
    - dexmedetomidine
    - xylazine
    - brorphine
    - fluorofentanyl
    - para-fluorofentanyl
    - bromazolam
    - designer benzodiazepine
    - 7-hydroxymitragynine
    - 7-OH
    - kratom
  massachusetts:
    - Massachusetts
    - Mass.
    - Boston
    - Worcester
    - Barnstable
    - Plymouth County
    - Middlesex County
    - Suffolk County
  drug_classes:
    - synthetic opioid
    - novel psychoactive substance
    - NPS
    - fentanyl
    - stimulant
    - cathinone
    - synthetic cannabinoid
    - veterinary sedative
    - opioid
    - benzodiazepine
    - psychostimulant
    - methamphetamine
    - naloxone
    - buprenorphine
    - methadone
  surveillance_terms:
    - overdose
    - drug checking
    - toxicology
    - public alert
    - health advisory
    - scheduling
    - seizure
    - mortality
    - emerging drug
    - drug safety
    - controlled substance
    - drug alert
    - poisoning
    - adulterant
    - contaminant
    - early warning

sources:
  - name: CFSRE NPS Discovery — Public Alerts
    type: html_links
    section: United States
    url: https://www.npsdiscovery.org/reports/public-alerts/
    selector: main
    selector_fallback: body
    link_selector: "a[href]"
    url_includes:
      - /reports/
      - .pdf
    exclude_terms:
      - skip to main content
      - contact
      - privacy
    include_all: true
    base_score: 4
    max_items: 30
    enabled: true

  - name: CFSRE NPS Discovery — Trend Reports
    type: html_links
    section: United States
    url: https://www.npsdiscovery.org/reports/trend-reports/
