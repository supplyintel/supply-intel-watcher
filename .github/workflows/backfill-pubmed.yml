name: Backfill PubMed history

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: pip install requests beautifulsoup4 feedparser pyyaml

      - name: Run PubMed backfill
        run: python backfill.py

      - name: Save changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/history.json
          git commit -m "Backfill PubMed history" || echo "No changes to commit"
          git push
