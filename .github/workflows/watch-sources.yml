name: Watch drug-surveillance sources

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 1"

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: pip install requests beautifulsoup4

      - name: Run watcher and create summary
        shell: bash
        run: |
          set -o pipefail
          python watch_sources.py 2>&1 | tee /tmp/drug-surveillance-report.txt

      - name: Build enhanced intelligence dashboard
        run: python enhance_dashboard.py

      - name: Save changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Update surveillance intelligence and dashboard" || echo "No changes to commit"
          git push

      - name: Email summary
        env:
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: |
          python - <<'PY'
          import os
          import smtplib
          from datetime import datetime, timezone
          from email.message import EmailMessage
          from pathlib import Path

          username = os.environ["EMAIL_USERNAME"]
          password = os.environ["EMAIL_PASSWORD"]

          report_path = Path("/tmp/drug-surveillance-report.txt")

          if report_path.exists():
              report = report_path.read_text(
                  encoding="utf-8",
                  errors="replace"
              ).strip()
          else:
              report = ""

          if not report:
              report = (
                  "The drug-surveillance watcher completed, "
                  "but the script did not produce any written output."
              )

          run_date = datetime.now(timezone.utc).strftime("%B %d, %Y")

          message = EmailMessage()
          message["From"] = username
          message["To"] = username
          message["Subject"] = f"Drug-surveillance summary — {run_date}"
          message.set_content(
              "Drug-surveillance watcher report\n"
              f"Run date: {run_date}\n\n"
              f"{report}\n"
          )

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
              server.login(username, password)
              server.send_message(message)

          print("Summary email sent successfully.")
          PY