name: Phase 3 tests

on:
  pull_request:
    paths:
      - "watch_sources.py"
      - "test_*.py"
      - "requirements.txt"
      - ".github/workflows/phase3-tests.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m unittest discover -v
